<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>拼豆计数工具</title>
<style>
body { font-family: Arial; padding: 20px; }
h2, h3 { margin-bottom: 10px; }
.palette { display: grid; grid-template-columns: repeat(auto-fill, 140px); gap: 10px; }
.color { display: flex; align-items: center; border: 1px solid #ccc; padding: 5px; }
.box { width: 30px; height: 30px; margin-right: 8px; border: 1px solid #999; cursor: default; }
.text { font-size: 12px; width: 60px; }
input { width: 50px; }
.stats { margin-top: 20px; }
button { margin: 5px; padding: 5px 8px; cursor: pointer; }
#batchModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border: 2px solid #333; padding: 15px; max-height: 80%; overflow-y: auto; z-index: 100; width: 300px; }
#overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 50; }
textarea { width: 100%; }
</style>
</head>
<body>

<h2>拼豆计数工具</h2>
<button onclick="openBatchModal()">批量修改数量</button>
<button onclick="exportExcel()">导出 Excel</button>

<div class="palette" id="palette"></div>

<h3>统计</h3>
<ul id="stats"></ul>

<div id="overlay"></div>
<div id="batchModal">
  <h3>批量修改数量</h3>
  <p>输入颜色编号和数量（例如：A1 120, B3 45）每行一个</p>
  <textarea id="batchInput" rows="8"></textarea><br>
  <button onclick="saveBatch()">保存</button>
  <button onclick="closeBatchModal()">取消</button>
</div>

<!-- 引入你的完整颜色文件 -->
<script src="./colours.js" type="text/javascript"></script>

<script>
// ==== 确保颜色文件已加载 ====
if(!mardColors || mardColors.length === 0){
    alert("颜色数组加载失败，请检查 colours.js 文件路径");
}

// ==== 排序：按编号顺序 ====
mardColors.sort((a, b) => {
  const na = parseInt(a.code.match(/\d+/)[0]);
  const nb = parseInt(b.code.match(/\d+/)[0]);
  if (a.code[0] === b.code[0]) return na - nb;
  return a.code.localeCompare(b.code);
});

// ==== 初始化计数 ====
const counts = {};
mardColors.forEach(c => counts[c.code] = 0);

// ==== 渲染 ====
const palette = document.getElementById("palette");
const stats = document.getElementById("stats");
function renderPalette(){
  palette.innerHTML = "";
  mardColors.forEach(c => {
    const div = document.createElement("div");
    div.className = "color";

    const box = document.createElement("div");
    box.className = "box";
    box.style.background = c.hex;
    box.title = c.code + " " + c.hex;

    const text = document.createElement("div");
    text.className = "text";
    text.innerHTML = `<b>${c.code}</b><br>${c.hex}`;

    const input = document.createElement("input");
    input.type = "number";
    input.value = counts[c.code];
    input.oninput = ()=>{ counts[c.code] = parseInt(input.value)||0; updateStats(); };

    div.appendChild(box);
    div.appendChild(text);
    div.appendChild(input);
    palette.appendChild(div);
  });
}

// ==== 更新统计 ====
function updateStats(){
  stats.innerHTML = "";
  Object.keys(counts).forEach(key => {
    if(counts[key] > 0){
      const li = document.createElement("li");
      li.innerText = `${key}: ${counts[key]}`;
      stats.appendChild(li);
    }
  });
}

// ==== 批量窗口 & 保存 ====
function openBatchModal(){
  document.getElementById("batchInput").value = "";
  document.getElementById("overlay").style.display = "block";
  document.getElementById("batchModal").style.display = "block";
}
function closeBatchModal(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("batchModal").style.display="none";
}
function saveBatch(){
  const lines = document.getElementById("batchInput").value.trim().split("\n");
  lines.forEach(line => {
    const parts = line.split(/\s+/);
    if(parts.length == 2 && parts[0] in counts){
       counts[parts[0]] = parseInt(parts[1]) || 0;
    }
  });
  renderPalette();
  updateStats();
  closeBatchModal();
}

// ==== 导出 CSV ====
function exportExcel(){
  let csv="编号,数量,HEX\n";
  mardColors.forEach(c => {
    csv += `${c.code},${counts[c.code]},${c.hex}\n`;
  });
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="拼豆数量统计.csv"; a.click();
  URL.revokeObjectURL(url);
}

// 初始化
renderPalette();
updateStats();
</script>

</body>
</html>
